[package]
name = "app"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router"] }
oauth2 = { workspace = true }

dotenv = { version = "0.15.0", optional = true }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "dotenv", "oauth2/server"]
