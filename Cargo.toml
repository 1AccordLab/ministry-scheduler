[workspace]
resolver = "2"
members = ["app", "crates/oauth2"]

[workspace.dependencies]
dioxus = { version = "0.6.2", default-features = false, features = [
  "html",
  "document",
  "macro",
  "signals",
  "hooks",
  "asset",
  "fullstack",
] }
thiserror = "2.0.11"
serde = { version = "1.0.217", features = ["derive"] }
tokio = "1.43.0"

oauth2 = { path = "crates/oauth2" }

[profile]

[profile.wasm-dev]
inherits = "dev"
opt-level = 0

[profile.server-dev]
inherits = "dev"

[profile.android-dev]
inherits = "dev"

[profile.release]
opt-level = "z"
debug = false
lto = true
codegen-units = 1
panic = "abort"
strip = true
incremental = false
